<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindo Hogar - Mis Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="./js/firebase-init.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/mp-init.js"></script>
    <script src="./js/carrito.js"></script>
    <script src="./js/mp-pedido-entrega.js"></script>
    <script defer src="./js/pedidos.js"></script>
</head>
<body>
    <div class="sticky-top bg-light shadow-sm">
        <header class="d-flex justify-content-between align-items-center px-4 py-3" style="background-color: #2c3e50;">
            <span class="h1 fw-bold text-white mb-0">Lindo Hogar</span>

            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="btn btn-outline-light rounded-pill px-3 btn-sm fw-bold">Volver a la tienda</a>
                <div id="auth-container"></div>
            </div>
        </header>
    </div>

    <main class="container my-4">
        <section class="bg-white rounded-4 shadow-sm p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h2 class="h4 mb-1">Mis pedidos</h2>
                    <p class="text-muted mb-0">Revisá tus compras y su estado actualizado.</p>
                </div>
                <button id="btn-recargar-pedidos" class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-bold">
                    Actualizar
                </button>
            </div>

            <div id="aviso-auth" class="alert alert-warning d-none mb-3">
                Tenés que iniciar sesión para ver tus pedidos.
            </div>

            <ul class="nav nav-pills mb-3" id="tabs-pedidos" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tab-pendientes" data-bs-toggle="pill" data-bs-target="#panel-pendientes" type="button" role="tab">
                        Pendientes de Pago
                        <span class="badge text-bg-warning ms-1" id="badge-pendientes-cantidad">0</span>
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-historial" data-bs-toggle="pill" data-bs-target="#panel-historial" type="button" role="tab">
                        Historial de Compras
                        <span class="badge text-bg-success ms-1" id="badge-historial-cantidad">0</span>
                    </button>
                </li>
            </ul>

            <div id="estado-carga" class="small text-muted mb-3"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="panel-pendientes" role="tabpanel" aria-labelledby="tab-pendientes">
                    <div id="lista-pendientes" class="row g-3"></div>
                </div>
                <div class="tab-pane fade" id="panel-historial" role="tabpanel" aria-labelledby="tab-historial">
                    <div id="lista-historial" class="row g-3"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-4 mt-4" style="background-color: #2c3e50;">
        <div class="container text-center text-white small">
            Lindo Hogar - Gracias por elegirnos.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
