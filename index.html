<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindo Hogar - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

<script src="./js/index.js"></script>

<script src="./js/auth.js"></script>
<script src="./js/carrito.js"></script>
</head>
<body>

<div class="sticky-top bg-light shadow-sm">
    <header class="d-flex justify-content-between align-items-center px-4 py-3" style="background-color: #2c3e50;">
    <span class="h1 fw-bold text-white mb-0">Lindo Hogar</span>
    
    <div class="d-flex align-items-center gap-3">
        
        <div id="auth-container">
    <button onclick="loginConGoogle()" class="btn btn-outline-light rounded-pill px-3 btn-sm fw-bold">
        👤 Ingresar
    </button>
</div>

        <a href="checkout.html" class="btn btn-success fw-bold rounded-pill shadow-sm d-flex align-items-center gap-2" aria-label="Ir al carrito">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="display:block; fill: currentColor;">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM6.2 6l.94 2h9.93c.75 0 1.41.41 1.75 1.03.19.35.26.76.19 1.16l-1.05 6.02c-.16.92-.96 1.59-1.9 1.59H8.1c-.8 0-1.51-.47-1.82-1.19L3.01 4H1V2h3.27c.38 0 .72.21.89.55L6.2 6Zm2.1 10h7.58l.96-5.5H7.14l1.16 5.5Z"/>
            </svg>
            <span id="contador-carrito" class="badge rounded-pill bg-danger" style="display: none;">0</span>
        </a>

    </div>
</header>
<section id="seccion-resumen-pedidos" class="container my-4" style="display: none;">
    <div class="alert alert-info d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h5 class="mb-0">Mis pedidos</h5>
            <small>Consultá el estado cuando quieras</small>
        </div>
        <div class="d-flex align-items-center gap-2">
            <select id="filtro-pedidos-usuario" class="form-select form-select-sm" style="width: 190px;" onchange="cambiarFiltroPedidosUsuario()">
                <option value="pendientes" selected>Sin confirmar</option>
                <option value="todos">Todos</option>
            </select>
            <button class="btn btn-sm btn-outline-info" onclick="toggleResumenPedidos()">Cerrar</button>
        </div>
    </div>
    <div class="pedidos-panel">
        <div id="contenedor-pedidos-usuario" class="row g-3"></div>
        <div class="pedidos-panel-footer">
            <button id="btn-ver-mas-pedidos" class="btn btn-outline-primary fw-bold rounded-pill px-4" style="display:none;" onclick="cargarMasPedidosUsuario()">
                Ver más
            </button>
        </div>
    </div>
</section>
    <section class="container py-3">
        <div class="row g-2 justify-content-center">
            <div class="col-12 col-md-10">
                <div class="input-group shadow-sm mb-2">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill">🔍</span>
                    <input type="text" id="input-busqueda" class="form-control border-start-0 rounded-end-pill" placeholder="¿Qué estás buscando?">
                </div>
            </div>
            
            <div class="col-12 col-md-10 d-flex gap-2 flex-wrap justify-content-center">
                <select id="filtro-categoria" class="form-select shadow-sm w-auto border-0">
                    <option value="TODOS">Todas las Categorías</option>
                    <option value="BAZAR">Bazar</option>
                    <option value="BLANCOS">Blancos</option>
                    <option value="ELECTRO">Electro</option>
                    <option value="ESCOLAR">Escolar</option>
                    <option value="INDUMENTARIA">Indumentaria</option>
                    <option value="JUGUETERIA">Juguetería</option>
                    <option value="OTROS">Otros</option>
                </select>

                <select id="filtro-orden" class="form-select shadow-sm w-auto border-0">
                    <option value="novedades">✨ Lo más nuevo</option>
                    <option value="precio-menor">💰 Precio: Menor a Mayor</option>
                    <option value="precio-mayor">💰 Precio: Mayor a Menor</option>
                    <option value="nombre-asc">🔤 Nombre: A - Z</option>
                </select>
            </div>
        </div>
    </section>
</div>



<main class="container my-4"> <div id="contenedor-productos" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        </div>
</main>
<div class="modal fade" id="modal-detalle" tabindex="-1" aria-labelledby="modalTitulo" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body p-4">
        <div class="row align-items-center">
          <div class="col-md-6 mb-3 mb-md-0">
            <img id="img-detalle" src="" class="img-fluid rounded-3 shadow-sm" alt="Producto" style="width: 100%; object-fit: contain; max-height: 450px;">
          </div>
          <div class="col-md-6 text-center text-md-start">
            <h2 id="titulo-detalle" class="fw-bold mb-3"></h2>
            <p id="descripcion-detalle" style="color: #666; font-size: 1.1rem; margin-bottom: 15px;"></p>
            <p id="precio-detalle" class="display-6 fw-bold text-success mb-2"></p>
            <p id="stock-detalle" class="fs-5 text-muted mb-4"></p>
            <div id="contenedor-boton-modal" class="d-grid gap-2">
               </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<button type="button" class="btn btn-primary btn-lg rounded-circle shadow-lg" id="btn-subir"
